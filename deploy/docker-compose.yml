services:
  resend-mcp:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: resend-mcp:latest
    container_name: resend-mcp
    restart: unless-stopped
    environment:
      - RESEND_API_KEY=${RESEND_API_KEY}
    ports:
      - "127.0.0.1:8765:8765"
    user: "node"
    read_only: true
    tmpfs:
      - /tmp:size=10M
    security_opt:
      - no-new-privileges:true
    mem_limit: 256m
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8765/mcp').then(r=>process.exit(r.status===405||r.status===400||r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
