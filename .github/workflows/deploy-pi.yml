name: Deploy Resend MCP to Pi

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: [self-hosted, linux, pi]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write .env
        run: |
          echo "RESEND_API_KEY=${RESEND_API_KEY}" > deploy/.env
          chmod 600 deploy/.env
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}

      - name: Build and deploy
        run: |
          cd deploy
          docker compose build --pull
          docker compose up -d

      - name: Health check
        run: |
          echo "Waiting for container..."
          sleep 15
          docker ps --filter name=resend-mcp --format '{{.Names}} {{.Status}}'
